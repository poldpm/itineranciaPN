<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Registre d'itinerància PN</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="images/logo-parc.png" alt="Logo Parc Natural" class="logo-cap">
  <h1>Itinerància</h1>
  <button id="btnConfig" class="icon-btn" title="Configuració">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="white" aria-hidden="true">
      <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.01 7.01 0 0 0-1.62-.94l-.36-2.54A.48.48 0 0 0 14 2h-4a.48.48 0 0 0-.48.41l-.36 2.54a7.08 7.08 0 0 0-1.61.94l-2.39-.96a.48.48 0 0 0-.59.22L2.65 8.47a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.47.47 0 0 0-.12.61l1.92 3.32c.12.22.37.3.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.06.28.31.48.6.48h4c.28 0 .53-.2.59-.47l.36-2.54a7.07 7.07 0 0 0 1.61-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
    </svg>
  </button>
</header>

<!-- PANTALLA: selecció d'àrea (inici de jornada) -->
<section id="screen-area" class="screen">
  <div class="card">
    <h2>Inici de jornada</h2>
    <p>A quina Àrea d'Informació itineraràs avui?</p>
    <div id="llistaArees" class="area-buttons"></div>
    <p style="font-size:0.85rem; color:#888; margin-top:12px;">
      Quedarà fixada durant tota la jornada. La pots canviar quan vulguis amb el botó "Canviar àrea".
    </p>
  </div>
</section>

<!-- PANTALLA PRINCIPAL -->
<section id="screen-main" class="screen">
  <div class="status-bar">
    <span id="estatConnexio" class="badge">●</span>
    <span id="pendents" class="badge pendents"></span>
  </div>

  <div class="area-activa">
    <div class="area-activa-info">
      <span class="area-label">Àrea activa</span>
      <span id="nomAreaActiva" class="area-nom"></span>
    </div>
    <button id="btnCanviarArea" class="btn-canviar">Canviar àrea</button>
  </div>

  <div class="seccions-punts">
    <div class="seccio-tipus">
      <h3>🥾 Trams</h3>
      <div id="llistaTrams" class="punts-grid"></div>
    </div>

    <div class="seccio-tipus">
      <h3>🅿️ Aparcaments</h3>
      <div id="llistaAparcaments" class="punts-grid"></div>
    </div>
  </div>

  <div id="ultimRegistre" class="ultim-registre"></div>
</section>

<!-- PANTALLA: formulari -->
<section id="screen-form" class="screen">
  <div class="form-header">
    <span id="formTipus" class="form-tipus-badge"></span>
    <h2 id="formTitol"></h2>
    <span id="formArea" class="form-area-sub"></span>
  </div>

  <div id="formCamps" class="form-camps"></div>

  <button class="btn btn-primary" id="btnDesarForm">Desar registre</button>
  <button class="btn btn-secondary" id="btnCancelarForm">← Cancel·la</button>
</section>

<!-- PANTALLA: configuració -->
<section id="screen-config" class="screen">
  <div class="card">
    <h2>Configuració</h2>
    <label>Àrea activa</label>
    <p id="configArea" style="font-weight:600;"></p>

    <label>Registres pendents de sincronitzar</label>
    <p id="configPendents">0</p>
    <button class="btn btn-secondary" id="btnSincronitzarAra">🔄 Sincronitza ara</button>

    <button class="btn btn-primary" id="btnTancarConfig" style="margin-top:24px;">Tancar</button>
  </div>
</section>

<div id="toast" class="toast"></div>

<script src="dades.js"></script>
<script src="app.js"></script>
</body>
</html>
